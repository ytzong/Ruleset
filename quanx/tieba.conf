# 百度贴吧去广告
# 移除开屏、信息流、帖内广告，精简个人页（由于拦截可能导致通知延迟）
# 注意：仅限 iOS 15+ 使用
# 作者：ZenmoFeiShi, 可莉🅥, app2smile
# 更新日期：2025-03-23

[filter_local]
# 广告与追踪域名屏蔽
host, afd.baidu.com, reject
host, mobads.baidu.com, reject
host, 180.76.76.200, reject
ip-cidr, 180.76.76.200/32, reject

[rewrite_local]
# --- Map Local (本地响应) ---
^https:\/\/tiebac\.baidu\.com\/c\/f\/search\/discover url reject-dict
^https:\/\/tiebac\.baidu\.com\/c\/f\/forum\/forumGuide url reject-dict
^https:\/\/tiebac\.baidu\.com\/c\/u\/chat\/getChatSubscriptionList url reject-dict

# --- Script (核心去广告) ---

# 1. 首页、侧拉抽屉、个人页清理 (JSON)
^https:\/\/tiebac\.baidu\.com\/(livefeed\/feed|c\/f\/sidebar\/home|c\/u\/user\/profile) url script-response-body https://kelee.one/Resource/Script/Tieba/Tieba_remove_ads.js
^https:\/\/tieba\.baidu\.com\/c\/f\/frs\/frsBottom url script-response-body https://kelee.one/Resource/Script/Tieba/Tieba_remove_ads.js

# 2. 贴吧通用 JSON 处理 (内容列表、同步接口)
^http(s:\/\/tiebac|:\/\/c\.tieba)\.baidu\.com\/(c\/f\/(frs\/(page|threadlist|generalTabList)|pb\/page|excellent\/personalized)$|tiebaads\/commonbatch|c\/s\/sync$) url script-response-body https://kelee.one/Resource/Script/Tieba/tieba-json.js

# 3. 贴吧 ProtoBuf 处理 (关键：处理二进制内容)
# QX 语法：script-response-body 配合二进制模式
^http(s:\/\/tiebac|:\/\/c\.tieba)\.baidu\.com\/c\/f\/(frs\/(page|threadlist|generalTabList)|pb\/page|excellent\/personalized)\?cmd url script-response-body https://kelee.one/Resource/Script/Tieba/tieba-proto.js

[mitm]
hostname = tiebac.baidu.com, tieba.baidu.com, c.tieba.baidu.com