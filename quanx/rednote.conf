# 小红书去广告 + 去水印（转换自 Surge 模块）
# 原作者: RuCu6, fmz200
# 日期参考: 2026-02-22
# 功能: 过滤信息流推广、移除图片/视频水印、去开屏/推荐/搜索广告等
# 注意: 需要开启 MITM + 信任证书，部分规则依赖响应体修改

# 返回 200 + 空内容（相当于 Surge 的 data-body {}）
^https:\/\/ci\.xiaohongshu\.com\/system_config\/watermark url reject-dict
^https:\/\/edith\.xiaohongshu\.com\/api\/sns\/v1\/surprisebox\/(?:get_style|open|submit_action) url reject-dict
^https:\/\/www\.xiaohongshu\.com\/api\/marketing\/box\/trigger\? url reject-dict
^https:\/\/edith\.xiaohongshu\.com\/api\/sns\/(?:v2\/guide\/user_banner|v3\/note\/guide) url reject-dict
^https:\/\/www\.xiaohongshu\.com\/api\/sns\/(?:v1\/ads\/resource|v2\/hey\/\w+\/hey_gallery) url reject-dict

# 去水印 & 主要广告过滤脚本（同一个 JS 处理大部分逻辑）
^https:\/\/edith\.xiaohongshu\.com\/api\/sns\/v1\/note\/(?:imagefeed|live_photo\/save) url script-response-body https://raw.githubusercontent.com/Moli-X/Tool/refs/heads/X/Loon/Plugin/Kelee/Script/RedPaper_remove_ads.js
^https:\/\/edith\.xiaohongshu\.com\/api\/sns\/v1\/system\/service\/ui\/config\? url script-response-body https://raw.githubusercontent.com/Moli-X/Tool/refs/heads/X/Loon/Plugin/Kelee/Script/RedPaper_remove_ads.js

