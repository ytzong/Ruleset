# 小红书去广告
# 过滤信息流推广，移除图片及视频水印
# 作者：RuCu6, fmz200
# 更新日期：2025-12-20

hostname = ci.xiaohongshu.com, edith.xiaohongshu.com, rec.xiaohongshu.com, so.xiaohongshu.com, www.xiaohongshu.com

# 屏蔽 QUIC 协议，强制回退至 HTTP 以确保重写生效
column, xiaohongshu.com, REJECT

# --- Body Rewrite (使用脚本替代 JQ 逻辑) ---
# 处理搜索栏 banner、热搜、热词、趋势等
^https:\/\/edith\.xiaohongshu\.com\/api\/sns\/v(1\/search\/banner_list|1\/search\/hot_list|4\/search\/(hint|trending)) url script-response-body https://kelee.one/Resource/JavaScript/RedPaper/RedPaper_remove_ads.js

# --- Map Local (本地响应) ---
# 水印配置
^https:\/\/ci\.xiaohongshu\.com\/system_config\/watermark url reject-img
# 惊喜盒子、营销弹窗
^https:\/\/edith\.xiaohongshu\.com\/api\/sns\/v1\/surprisebox\/(get_style|open|submit_action) url reject-dict
^https:\/\/www\.xiaohongshu\.com\/api\/marketing\/box\/trigger\? url reject-dict
# 引导横幅、广告资源
^https:\/\/edith\.xiaohongshu\.com\/api\/sns\/(v2\/guide\/user_banner|v3\/note\/guide) url reject-dict
^https:\/\/www\.xiaohongshu\.com\/api\/sns\/(v1\/ads\/resource|v2\/hey\/\w+\/hey_gallery) url reject-dict

# --- Script (核心去广告脚本) ---
# 合并原有的多条 Script 声明以优化性能
# 涵盖了：水印移除、开屏配置、信息流广告、搜索广告、视频保存等逻辑
^https:\/\/(edith|rec|so|www)\.xiaohongshu\.com\/api\/sns\/(v1\/note\/(imagefeed|live_photo\/save)|v1\/system\/service\/ui\/config|v1\/system_service\/config|v2\/system_service\/splash_config|v2\/(note\/widgets|user\/followings\/followfeed)|v4\/followfeed|v5\/recommend\/user\/follow_recommend|v1\/interaction\/comment\/video\/download|v5\/note\/comment\/list|v2\/note\/feed|v3\/note\/videofeed|v6\/homefeed|v10\/search\/notes|v4\/note\/videofeed|v10\/note\/video\/save) url script-response-body https://kelee.one/Resource/JavaScript/RedPaper/RedPaper_remove_ads.js
