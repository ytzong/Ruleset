# 什么值得买去广告
# 移除开屏、信息流、搜索页广告及精简“我的”页面
# 作者：可莉🅥
# 更新日期：2025-11-27

hostname = app-api.smzdm.com, homepage-api.smzdm.com, h5.smzdm.com, haojia-api.smzdm.com, haojia.m.smzdm.com, user-api.smzdm.com, article-api.smzdm.com, s-api.smzdm.com, haojia-cdn.smzdm.com, post.m.smzdm.com

# 屏蔽广告追踪域名
host, adx-api.zdmimg.com, reject

# --- URL Rewrite (Reject) ---
^https:\/\/h5\.smzdm\.com\/user\/coupon\/coupon_list\? url reject

# --- Map Local (直接返回空字典) ---
^https:\/\/app-api\.smzdm\.com\/util\/loading\? url reject-dict
^https:\/\/app-api\.smzdm\.com\/mychannel\/list$ url reject-dict
^https:\/\/user-api\.smzdm\.com\/vip\/bottom_card_list\? url reject-dict
^https:\/\/article-api\.smzdm\.com\/publish\/get_bubble\? url reject-dict
^https:\/\/s-api\.smzdm\.com\/sou\/search_default_keyword\? url reject-dict
^https:\/\/s-api\.smzdm\.com\/sou\/popup_coupon\? url reject-dict

# --- Script (处理复杂的 JQ 逻辑) ---
# 该脚本已涵盖：首页组件过滤、搜索列表去广告、详情页精简等
^https:\/\/(app-api|homepage-api|haojia-api|user-api|s-api|article-api)\.smzdm\.com url script-response-body https://kelee.one/Resource/JavaScript/smzdm/smzdm_remove_ads.js
^https:\/\/haojia\.m\.smzdm\.com\/(detail_modul\/user_related_modul|detail_modul\/other_modul) url script-response-body https://kelee.one/Resource/JavaScript/smzdm/smzdm_remove_ads.js
^https:\/\/haojia-cdn\.smzdm\.com\/preload\/.*\.json$ url script-response-body https://kelee.one/Resource/JavaScript/smzdm/smzdm_remove_ads.js
^https:\/\/post\.m\.smzdm\.com\/ajax_app\/ajax_get_footer_list\? url script-response-body https://kelee.one/Resource/JavaScript/smzdm/smzdm_remove_ads.js
