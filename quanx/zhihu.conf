# --- URL Rewrite ---
# 移除卡片与更多视图
^https:\/\/api\.zhihu\.com\/unlimited\/go\/my_card url reject
^https:\/\/www\.zhihu\.com\/appview\/v3\/zhmore url reject
# 知乎安全中心跳转拦截 (302 定向)
^https:\/\/link\.zhihu\.com\/\?target=(?:https?)?(?:%3A|:)?(?:\/\/|%2F%2F)?([^&]*) url 302 $1

# --- Map Local (直接返回空数据) ---
# 合并部分 api.zhihu.com 的 reject 请求
^https:\/\/api\.zhihu\.com\/(commercial_api\/|content-distribution-core\/bubble\/common\/settings|moments\/lastread|drama\/hot-drama-list|root\/window|bazaar\/float_window|market\/popovers_v2|me\/guides|people\/homepage_entry_v2|search\/(hot_search|preset_words)|comment_v5\/(articles|answers)\/\d+\/list-headers|prague\/related_suggestion_native\/feed\?|v5\.1\/topics\/answer\/\d+\/relation|ab\/api\/v1\/products\/zhihu\/platforms\/ios\/config|ad-style-service\/request|distribute\/rhea\/qa_ad_card\/h5\/recommendation\?) url reject-dict

^https:\/\/appcloud2\.zhihu\.com\/v3\/resource\?group_name=mp url reject-dict
^https:\/\/www\.zhihu\.com\/api\/v4\/(hot_recommendation|mcn\/v2\/linkcards\?|(answers|questions)\/\d+\/related-readings) url reject-dict
^https:\/\/www\.zhihu\.com\/commercial_api\/banners_v3\/mobile_banner url reject-dict
^https:\/\/zhuanlan\.zhihu\.com\/api\/articles\/\d+\/recommendation url reject-dict

# --- Script (处理 JQ 逻辑与核心去广告) ---
# 脚本已涵盖原本所有的 JQ 过滤逻辑 (如 vip_tab、questions 过滤等)
^https:\/\/(api|page-info)\.zhihu\.com\/((bazaar\/vip_tab\/header|search\/recommend_query\/v2|questions\/\d+|answers\/v2\/\d+|articles\/v2\/\d+)|commercial_api\/app_float_layer|feed\/render\/tab\/config|moments_v3|topstory\/hot-lists|topstory\/recommend|root\/tab|v2\/topstory\/hot-lists\/everyone-seeing|next-(bff|data|render)) url script-response-body https://kelee.one/Resource/JavaScript/Zhihu/Zhihu_remove_ads.js
^https:\/\/www\.zhihu\.com\/api\/v4\/(articles|answers)\/\d+\/recommendations?\? url script-response-body https://kelee.one/Resource/JavaScript/Zhihu/Zhihu_remove_ads.js
^https:\/\/appcloud2\.zhihu\.com\/v3\/config url script-response-body https://kelee.one/Resource/JavaScript/Zhihu/Zhihu_remove_ads.js
^https:\/\/m-cloud\.zhihu\.com\/api\/cloud\/zhihu\/config\/all\? url script-response-body https://kelee.one/Resource/JavaScript/Zhihu/Zhihu_remove_ads.js

